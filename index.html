<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Preview with iframe</title>
  <style>
    .preview-container {
      position: relative;
      display: inline-block;
    }

    .preview {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 200px;
      height: 150px;
      border: 1px solid #ccc;
      background-color: #fff;
      z-index: 10;
      overflow: hidden;
    }

    .preview-container:hover .preview {
      display: block;
    }

    iframe {
      width: 1000px;
      /* Large width for scaling */
      height: 750px;
      /* Large height for scaling */
      transform: scale(0.2);
      /* Scale the site down to 20% */
      transform-origin: 0 0;
      /* Set scaling origin to top-left */
      border: 0;
    }
  </style>
</head>

<body>

  <div class="preview-container">
    <a href="./tailwind-mini-projects/email-subscribe/index.html" target="_blank">Visit Example</a>
    <div class="preview">
      <iframe src="./tailwind-mini-projects/email-subscribe/index.html" frameborder="0"></iframe>
    </div>
  </div>

</body>

</html>
